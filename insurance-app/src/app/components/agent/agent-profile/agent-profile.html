<div class="p-8 font-lato max-w-4xl mx-auto" *ngIf="!loading">
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-[#75013f]">Agent Profile</h1>
    <p class="text-gray-500">View your performance ID and manage contact details</p>
  </div>

  <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
    <div class="h-32 bg-gradient-to-r from-[#75013f] to-[#fe3082] relative">
      <div class="absolute -bottom-12 left-8 w-24 h-24 bg-white rounded-2xl shadow-lg border-4 border-[#f5f2ef] flex items-center justify-center text-[#75013f] text-3xl font-bold">
        {{ profile.name?.charAt(0) }}
      </div>
    </div>

    <div class="pt-16 p-8">
      <div class="flex justify-between items-center mb-8">
        <div>
          <h2 class="text-2xl font-bold text-gray-800">{{ profile.name }}</h2>
          <div class="flex items-center gap-2 mt-1">
            <span class="w-2 h-2 rounded-full bg-green-500"></span>
            <p class="text-xs text-gray-500 font-bold uppercase tracking-widest">Active Agent | ID: {{ profile.id }}</p>
          </div>
        </div>
        <button (click)="isEditing = !isEditing" 
                class="px-6 py-2 rounded-xl border-2 border-[#75013f] text-[#75013f] font-bold hover:bg-[#75013f] hover:text-white transition-all">
          {{ isEditing ? 'Cancel' : 'Edit Details' }}
        </button>
      </div>

      <form (ngSubmit)="onUpdate()" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="space-y-1">
          <label class="text-xs font-bold text-[#75013f] uppercase">Full Name</label>
          <input name="name" [(ngModel)]="profile.name" [disabled]="!isEditing"
                 class="w-full p-3 rounded-xl border border-gray-200 focus:border-[#75013f] outline-none disabled:bg-gray-50">
        </div>

        <div class="space-y-1">
          <label class="text-xs font-bold text-[#75013f] uppercase">Phone Number</label>
          <input name="phone" [(ngModel)]="profile.phone" [disabled]="!isEditing"
                 class="w-full p-3 rounded-xl border border-gray-200 focus:border-[#75013f] outline-none disabled:bg-gray-50">
        </div>

        <div class="md:col-span-2 space-y-1">
          <label class="text-xs font-bold text-gray-400 uppercase">Registered Email (Read-Only)</label>
          <div class="flex items-center gap-3 w-full p-3 rounded-xl border border-gray-100 bg-gray-50 text-gray-400">
            <span>🔒</span>
            <span class="text-sm">{{ profile.email }}</span>
          </div>
        </div>

        <div class="md:col-span-2 pt-4" *ngIf="isEditing">
          <button type="submit" 
                  class="w-full py-4 bg-[#75013f] text-white rounded-2xl font-bold hover:bg-[#fe3082] transition-all shadow-lg shadow-[#75013f]/20">
            Update Agent Information
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
