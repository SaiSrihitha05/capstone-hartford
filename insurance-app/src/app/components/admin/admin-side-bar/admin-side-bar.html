<aside class="w-64 min-h-screen bg-white border-r border-gray-200 flex flex-col fixed left-0 top-16">
  <div class="flex-1 py-6 px-4">
    <nav class="space-y-2">
      <a *ngFor="let link of navLinks"
         [routerLink]="link.path"
         routerLinkActive="bg-[#75013f] text-white"
         [routerLinkActiveOptions]="{exact: true}"
         class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-[#75013f]/10 transition-all group font-medium">
        
        <span class="text-xl group-hover:scale-110 transition-transform">
            {{ link.icon }}
        </span>
        
        <span class="font-lato">{{ link.label }}</span>
      </a>
    </nav>
  </div>

  <div class="p-4 border-t border-gray-100">
    <div class="bg-[#f5f2ef] rounded-2xl p-4">
      <p class="text-xs text-[#75013f] font-bold uppercase tracking-wider">Admin Role</p>
      <p class="text-sm text-gray-500 truncate">Support Portal v1.0</p>
    </div>
  </div>
</aside>
