<div class="p-6 font-lato">
  <div class="flex justify-between items-end mb-8">
    <div>
      <h1 class="text-2xl font-bold text-[#75013f]">User Management</h1>
      <div class="flex gap-4 mt-4">
        <button (click)="switchTab('Customer')" [class]="activeTab === 'Customer' ? 'border-b-2 border-[#75013f] text-[#75013f]' : 'text-gray-400'" class="pb-2 font-bold transition-all">Customers</button>
        <button (click)="switchTab('Agent')" [class]="activeTab === 'Agent' ? 'border-b-2 border-[#75013f] text-[#75013f]' : 'text-gray-400'" class="pb-2 font-bold transition-all">Agents</button>
        <button (click)="switchTab('ClaimsOfficer')" [class]="activeTab === 'ClaimsOfficer' ? 'border-b-2 border-[#75013f] text-[#75013f]' : 'text-gray-400'" class="pb-2 font-bold transition-all">Claims Officers</button>
      </div>
    </div>
    
    <button *ngIf="activeTab !== 'Customer'" (click)="showModal = true" class="bg-[#75013f] text-white px-6 py-2 rounded-xl font-bold hover:bg-[#fe3082]">
      + Add {{ activeTab }}
    </button>
  </div>

<div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
  <table class="w-full text-left" *ngIf="!loading">
    <thead class="bg-gray-50 border-b">
      <tr class="text-[#75013f] text-sm font-bold">
        <th class="px-6 py-4">Name / ID</th>
        <th class="px-6 py-4">Email</th>
        <th class="px-6 py-4">Phone</th>
        <th class="px-6 py-4 text-right">Actions</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-50">
      <tr *ngFor="let user of users" class="hover:bg-gray-50 transition-colors">
        <td class="px-6 py-4">
          <p class="font-bold text-gray-800">{{ user.name }}</p>
          <p class="text-[10px] text-gray-400 uppercase">ID: {{ user.id }}</p>
        </td>
        <td class="px-6 py-4 text-sm">{{ user.email }}</td>
        <td class="px-6 py-4 text-sm">{{ user.phone }}</td>
        <td class="px-6 py-4 text-right">
          <button (click)="deleteUser(user.id)" class="text-red-500 font-bold text-sm">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="loading" class="p-10 text-center text-[#75013f] font-bold animate-pulse">
    Loading {{ activeTab }}s...
  </div>

  <div *ngIf="!loading && users.length === 0" class="p-10 text-center text-gray-400 font-bold">
    No {{ activeTab }}s registered in the system.
  </div>
</div>

  <div *ngIf="showModal" class="fixed inset-0 z-[60] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
    <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-8">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold text-[#75013f]">Add New {{ activeTab }}</h2>
        <button (click)="showModal = false" class="text-gray-400 text-2xl">&times;</button>
      </div>

      <form (ngSubmit)="onSubmit()" class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-[#75013f] uppercase mb-1">Full Name</label>
          <input name="name" [(ngModel)]="newUser.name" required class="w-full border p-3 rounded-xl outline-none focus:border-[#fe3082]">
        </div>
        <div>
          <label class="block text-xs font-bold text-[#75013f] uppercase mb-1">Email Address</label>
          <input name="email" type="email" [(ngModel)]="newUser.email" required class="w-full border p-3 rounded-xl outline-none focus:border-[#fe3082]">
        </div>
        <div>
          <label class="block text-xs font-bold text-[#75013f] uppercase mb-1">Phone Number</label>
          <input name="phone" [(ngModel)]="newUser.phone" required class="w-full border p-3 rounded-xl outline-none focus:border-[#fe3082]">
        </div>
        <div>
          <label class="block text-xs font-bold text-[#75013f] uppercase mb-1">Temporary Password</label>
          <input name="password" type="password" [(ngModel)]="newUser.password" required minlength="6" class="w-full border p-3 rounded-xl outline-none focus:border-[#fe3082]">
        </div>

        <button type="submit" class="w-full py-4 bg-[#75013f] text-white rounded-xl font-bold hover:bg-[#fe3082] transition-all">
          Register {{ activeTab }}
        </button>
      </form>
    </div>
  </div>
</div>
