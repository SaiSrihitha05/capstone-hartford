<section class="min-h-screen bg-[#f5f2ef] flex items-center justify-center px-4">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-[#75013f]">Welcome Back</h2>
      <p class="text-gray-500 mt-2">Log in to manage your Hartford policies</p>
    </div>

    <form class="space-y-4">
      <div>
        <label class="block text-[#75013f] font-semibold mb-1">Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="Enter your email" 
               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[#75013f] outline-none transition-all">
      </div>
      <div>
        <label class="block text-[#75013f] font-semibold mb-1">Password</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" 
               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[#75013f] outline-none transition-all">
      </div>
      
      <button type="submit" (click)="onLogin()" class="w-full py-3 bg-[#75013f] text-white rounded-xl font-bold hover:bg-[#fe3082] transition-all shadow-md">
        Login
      </button>
    </form>

    <p class="text-center mt-6 text-gray-600">
      Don't have an account? 
      <a routerLink="/register" class="text-[#fe3082] font-bold hover:underline">Register here</a>
    </p>
  </div>
</section>
